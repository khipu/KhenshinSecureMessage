name: SPM Build & Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  spm:
    name: swift build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Build
        run: swift build
      - name: Test
        run: swift test
